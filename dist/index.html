<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFR Simulator Pro | Solar Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-CVWSCSHC.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-D4y4mlCy.css">
</head>
<body class="dark-theme">
    <div id="app">
        <aside class="sidebar">
            <header>
                <div class="logo-area">
                    <span class="logo-icon">☀️</span>
                    <h1>LFR <span class="accent">SIMULATOR</span></h1>
                </div>
            </header>
            
            <div class="scroll-area">
                <div class="control-section">
                    <h3>Location & Time</h3>
                    <div class="input-group">
                        <label>Latitude (°)</label>
                        <input type="number" id="lat" step="0.001" value="10.900">
                    </div>
                    <div class="input-group">
                        <label>Longitude (°)</label>
                        <input type="number" id="lon" step="0.001" value="76.900">
                    </div>
                    <div class="input-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" id="dateTime">
                    </div>
                </div>

                <div class="control-section">
                    <h3>System Geometry</h3>
                    <div class="input-group">
                        <label>Receiver Height (m)</label>
                        <input type="number" id="rHeight" step="0.1" value="10.0">
                    </div>
                    <div class="input-group">
                        <label>Base Spacing (m)</label>
                        <input type="number" id="bSpacing" step="0.1" value="5.0">
                    </div>
                </div>

                <button id="optimizeBtn" class="btn-primary glow">OPTIMIZE TRACKING</button>
                <button id="guideBtn" class="btn-outline">Technical User Guide</button>

                <div class="results-section">
                    <h3>Mirror Tilt Results</h3>
                    <div class="tilt-table-wrapper">
                        <table id="tiltTable">
                            <thead>
                                <tr>
                                    <th>Mirror</th>
                                    <th>Tilt Angle</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Generated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <footer>
                <button id="downloadBtn" class="btn-ghost">Download Report</button>
            </footer>
        </aside>

        <main class="content">
            <div class="stats-row">
                <div class="stat-card">
                    <span class="label">Sun Altitude (Zenith)</span>
                    <span class="value" id="sunAlt">0.00°</span>
                </div>
                <div class="stat-card">
                    <span class="label">Sun Azimuth</span>
                    <span class="value" id="sunAz">0.00°</span>
                </div>
                <div class="stat-card">
                    <span class="label">System Status</span>
                    <span class="value accent" id="sysStatus">OPTIMIZED</span>
                </div>
            </div>

            <div class="viz-container">
                <div id="rayViz"></div>
            </div>
            
            <div class="chart-container">
                <div id="efficiencyChart"></div>
            </div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <header>
                <h2>Production Report Preview</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </header>
            <div class="modal-body">
                <pre id="csvPreview"></pre>
            </div>
            <footer>
                <button id="confirmDownload" class="btn-primary">Export to CSV</button>
            </footer>
        </div>
    </div>

</body>
</html>
